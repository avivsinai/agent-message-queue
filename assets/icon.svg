<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Agent Message Queue</title>
  <desc id="desc">Two AI agent nodes connected by a clean message relay loop around an AI core.</desc>
  <defs>
    <linearGradient id="bg" x1="78" y1="42" x2="428" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172033"/>
      <stop offset=".55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="wash" cx="50%" cy="42%" r="62%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".18"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="relay" x1="112" y1="180" x2="400" y2="332" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset=".52" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="core" x1="209" y1="194" x2="310" y2="318" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ECFEFF"/>
      <stop offset=".48" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <filter id="shadow" x="-22%" y="-22%" width="144%" height="154%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".42"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="9" flood-color="#22D3EE" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="98" fill="none" stroke="#F8FAFC" stroke-opacity=".08" stroke-width="2"/>
  <rect width="512" height="512" rx="108" fill="url(#wash)"/>

  <g filter="url(#shadow)">
    <path d="M134 256c30-92 102-99 122-20 20-79 92-72 122 20-30 92-102 99-122 20-20 79-92 72-122-20z" fill="none" stroke="#334155" stroke-width="52" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M134 256c30-92 102-99 122-20 20-79 92-72 122 20-30 92-102 99-122 20-20 79-92 72-122-20z" fill="none" stroke="url(#relay)" stroke-width="34" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <circle cx="133" cy="256" r="58" fill="#E2E8F0"/>
    <circle cx="119" cy="252" r="8" fill="#0F172A"/>
    <circle cx="148" cy="252" r="8" fill="#0F172A"/>
    <path d="M116 280h36" stroke="#64748B" stroke-width="10" stroke-linecap="round"/>

    <circle cx="379" cy="256" r="58" fill="#F8FAFC"/>
    <circle cx="364" cy="252" r="8" fill="#0F172A"/>
    <circle cx="393" cy="252" r="8" fill="#0F172A"/>
    <path d="M361 280h36" stroke="#64748B" stroke-width="10" stroke-linecap="round"/>

    <circle cx="256" cy="256" r="76" fill="#0F172A"/>
    <circle cx="256" cy="256" r="62" fill="url(#core)"/>
    <path d="M256 197l17 42 42 17-42 17-17 42-17-42-42-17 42-17z" fill="#F8FAFC"/>
    <circle cx="256" cy="256" r="16" fill="#0F172A" fill-opacity=".72"/>
  </g>
</svg>
