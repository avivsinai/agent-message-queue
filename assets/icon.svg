<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Agent Message Queue</title>
  <desc id="desc">Two AI agent nodes exchanging queued messages through a central neural core.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="40" x2="430" y2="474" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E293B"/>
      <stop offset=".55" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="45%" r="62%">
      <stop offset="0" stop-color="#22D3EE" stop-opacity=".2"/>
      <stop offset=".48" stop-color="#14B8A6" stop-opacity=".08"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="core" x1="198" y1="176" x2="320" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A7F3D0"/>
      <stop offset=".4" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="agent" x1="102" y1="112" x2="185" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <linearGradient id="agentDark" x1="325" y1="288" x2="415" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="amber" x1="110" y1="354" x2="214" y2="278" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="rail" x1="78" y1="101" x2="445" y2="414" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#94A3B8" stop-opacity=".82"/>
      <stop offset=".5" stop-color="#22D3EE" stop-opacity=".78"/>
      <stop offset="1" stop-color="#64748B" stop-opacity=".86"/>
    </linearGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity=".38"/>
    </filter>
    <filter id="softShadow" x="-35%" y="-35%" width="170%" height="180%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#020617" flood-opacity=".35"/>
    </filter>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22D3EE" flood-opacity=".68"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect x="10" y="10" width="492" height="492" rx="98" fill="none" stroke="#F8FAFC" stroke-opacity=".08" stroke-width="2"/>
  <rect width="512" height="512" rx="108" fill="url(#halo)"/>

  <path d="M152 161c65-61 176-67 246-7 59 51 78 133 47 205" fill="none" stroke="url(#rail)" stroke-width="18" stroke-linecap="round"/>
  <path d="M435 360l-4-49m4 49l43-26" fill="none" stroke="#22D3EE" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M360 407c-76 54-187 45-253-25-48-51-60-125-32-188" fill="none" stroke="url(#rail)" stroke-width="16" stroke-linecap="round"/>
  <path d="M104 377c24 26 57 45 95 54" fill="none" stroke="#2DD4BF" stroke-width="16" stroke-linecap="round" stroke-dasharray="1 28" filter="url(#glow)"/>

  <g filter="url(#softShadow)">
    <rect x="81" y="108" width="128" height="112" rx="34" fill="url(#agent)"/>
    <path d="M117 107v-21m56 21v-21" stroke="#94A3B8" stroke-width="12" stroke-linecap="round"/>
    <circle cx="117" cy="82" r="12" fill="#22D3EE"/>
    <circle cx="173" cy="82" r="12" fill="#F59E0B"/>
    <rect x="111" y="143" width="68" height="39" rx="18" fill="#0F172A"/>
    <circle cx="132" cy="163" r="6" fill="#67E8F9"/>
    <circle cx="158" cy="163" r="6" fill="#67E8F9"/>
    <path d="M124 198h42" stroke="#64748B" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M256 164l88 50v100l-88 50-88-50V214z" fill="url(#core)"/>
    <path d="M256 184l70 40v80l-70 40-70-40v-80z" fill="#0F172A" fill-opacity=".2" stroke="#ECFEFF" stroke-opacity=".45" stroke-width="3"/>
    <circle cx="256" cy="256" r="22" fill="#F8FAFC"/>
    <circle cx="216" cy="234" r="13" fill="#ECFEFF"/>
    <circle cx="296" cy="234" r="13" fill="#ECFEFF"/>
    <circle cx="220" cy="294" r="13" fill="#ECFEFF"/>
    <circle cx="292" cy="296" r="13" fill="#ECFEFF"/>
    <path d="M236 245l-20-11m40 22l40-22m-40 22l-36 38m36-38l36 40" stroke="#0F172A" stroke-opacity=".46" stroke-width="9" stroke-linecap="round"/>
    <path d="M210 214h-28m148 0h-28M182 314h28m92 0h28" stroke="#A7F3D0" stroke-width="9" stroke-linecap="round"/>
    <path d="M256 164v-28m0 200v28" stroke="#A7F3D0" stroke-width="9" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="311" y="306" width="128" height="112" rx="34" fill="url(#agentDark)"/>
    <path d="M347 305v-21m56 21v-21" stroke="#64748B" stroke-width="12" stroke-linecap="round"/>
    <circle cx="347" cy="280" r="12" fill="#F59E0B"/>
    <circle cx="403" cy="280" r="12" fill="#22D3EE"/>
    <rect x="341" y="341" width="68" height="39" rx="18" fill="#0F172A"/>
    <circle cx="362" cy="361" r="6" fill="#67E8F9"/>
    <circle cx="388" cy="361" r="6" fill="#67E8F9"/>
    <path d="M354 396h42" stroke="#64748B" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="101" y="300" width="96" height="58" rx="17" fill="url(#amber)"/>
    <path d="M117 318l32 22 32-22" fill="none" stroke="#7C2D12" stroke-opacity=".5" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="328" y="151" width="92" height="56" rx="17" fill="#F8FAFC"/>
    <path d="M344 168l30 21 30-21" fill="none" stroke="#0F172A" stroke-opacity=".34" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="237" cy="118" r="13" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="281" cy="414" r="13" fill="#F59E0B"/>
  </g>
</svg>
